<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two-factor authentication – M365 Secret Monitor</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --blue: #0078d4; --blue-dark: #005a9e;
      --surface: #f3f2f1; --text: #201f1e; --muted: #605e5c; --border: #edebe9;
      --red: #d13438; --red-bg: #fde7e9;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--surface); color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: white; border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      padding: 48px 44px; width: 100%; max-width: 400px;
      text-align: center;
    }
    .icon { font-size: 44px; margin-bottom: 20px; }
    .org-logo { display: flex; align-items: center; justify-content: center; margin-bottom: 24px; min-height: 36px; }
    .org-logo img { max-height: 48px; max-width: 160px; object-fit: contain; display: none; }

    h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; line-height: 1.5; }

    .token-input {
      width: 100%; padding: 14px 16px;
      border: 2px solid #c8c6c4; border-radius: 6px;
      font-size: 28px; font-family: 'Cascadia Code', 'Consolas', monospace;
      letter-spacing: 10px; text-align: center;
      color: var(--text); margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    .token-input:focus { outline: none; border-color: var(--blue); }
    .token-input.error { border-color: var(--red); }

    .error-box {
      display: none; padding: 10px 14px;
      background: var(--red-bg); border: 1px solid #f1707b;
      border-radius: 4px; color: var(--red); font-size: 13px;
      margin-bottom: 16px;
    }
    .error-box.show { display: block; }

    button[type=submit] {
      width: 100%; padding: 12px;
      background: var(--blue); color: white;
      border: none; border-radius: 4px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    button[type=submit]:hover { background: var(--blue-dark); }

    .back-link { display: block; margin-top: 20px; font-size: 13px; color: var(--muted); text-decoration: none; }
    .back-link:hover { color: var(--blue); }
  </style>
</head>
<body>
<div class="card">
  <div class="org-logo">
    <img id="custom-logo" src="/api/logo" alt="Logo">
  </div>

  <div class="icon">🔐</div>
  <h2>Two-factor authentication</h2>
  <p class="sub">Open your authenticator app and enter the 6-digit code for <strong>M365 Secret Monitor</strong>.</p>

  <div id="error-box" class="error-box">Incorrect code. Please try again.</div>

  <form method="POST" action="/login/2fa">
    <input
      class="token-input" id="token" name="token"
      type="text" inputmode="numeric" maxlength="6"
      placeholder="000000" autocomplete="one-time-code" autofocus required>
    <button type="submit">Verify</button>
  </form>

  <a href="/login" class="back-link">← Back to sign in</a>
</div>

<script>
  const logoImg = document.getElementById('custom-logo');
  logoImg.onload  = () => logoImg.style.display = 'block';
  logoImg.onerror = () => logoImg.style.display = 'none';

  if (new URLSearchParams(location.search).get('error')) {
    document.getElementById('error-box').classList.add('show');
    document.getElementById('token').classList.add('error');
  }
  // Auto-submit when 6 digits are entered
  document.getElementById('token').addEventListener('input', e => {
    e.target.classList.remove('error');
    if (e.target.value.replace(/\D/g,'').length === 6) {
      e.target.value = e.target.value.replace(/\D/g,'');
      e.target.closest('form').submit();
    }
  });
</script>
</body>
</html>
